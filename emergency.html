<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Siren Matrix - RoadSense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#030712] text-slate-100 min-h-screen">

    <div class="max-w-6xl mx-auto px-6 py-12">
        
        <a href="index.html" class="text-xs font-mono font-bold text-slate-500 hover:text-rose-400 transition-colors inline-flex items-center gap-2 mb-8 tracking-wider">
            ← RETURN TO MASTER CENTER
        </a>

        <div class="flex items-center justify-between border-b border-slate-900 pb-6 mb-8">
            <div class="flex items-center gap-4">
                <div class="text-3xl p-3 bg-rose-500/10 border border-rose-500/20 rounded-xl shadow-lg shadow-rose-500/5">🚨</div>
                <div>
                    <h2 class="text-2xl font-black text-white tracking-wide">Objective 2: Emergency Vehicle Proximity Matrix</h2>
                    <p class="text-xs text-slate-400 mt-0.5 font-mono text-rose-400/80">Active Live Bridge Target: asrcoddeploy/EVobj-Detection</p>
                </div>
            </div>
            
            <div class="hidden md:flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/20 px-3 py-1.5 rounded-lg">
                <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                <span class="text-[10px] font-mono font-bold text-emerald-400 tracking-wider">YOLOv8 CORE RUNNING</span>
            </div>
        </div>

        <div class="glass-card rounded-2xl overflow-hidden p-2 relative pulse-glow-container">
            <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-rose-500/40 pointer-events-none"></div>
            <div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-rose-500/40 pointer-events-none"></div>
            <div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-rose-500/40 pointer-events-none"></div>
            <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-rose-500/40 pointer-events-none"></div>
            
            <iframe 
                src="https://asrcoddeploy-evobj-detection.hf.space" 
                frameborder="0" 
                width="100%" 
                height="680" 
                class="w-full bg-[#0b0f19]/30 rounded-xl block"
                allow="accelerometer; ambient-light-sensor; camera; microphone; geolocation"
                style="color-scheme: dark;">
            </iframe>
        </div>

        <footer class="mt-6 text-center text-[10px] font-mono text-slate-600 tracking-widest uppercase">
            Traffic Intelligence Interface // Objective 2 YOLO Machine Vision Core
        </footer>

    </div>
</body>
</html>
